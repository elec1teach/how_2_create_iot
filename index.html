<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJECT NEON - IoT Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #020617;
        --panel-bg: rgba(15, 23, 42, 0.7);
        --neon-blue: #00ffff;
        --neon-purple: #8b5cf6;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Prompt', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
        background-image: 
            radial-gradient(circle at 15% 50%, rgba(0, 255, 255, 0.05), transparent 25%),
            radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.05), transparent 25%);
    }

    /* แถบเมนูด้านซ้าย */
    .sidebar {
        width: 320px;
        background: var(--panel-bg);
        border-right: 1px solid rgba(0, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 20px;
        display: flex;
        flex-direction: column;
        z-index: 10;
    }

    .brand {
        font-family: 'Orbitron', sans-serif;
        font-size: 24px;
        color: var(--neon-blue);
        text-shadow: 0 0 10px var(--neon-blue);
        margin-bottom: 25px;
        text-align: center;
        letter-spacing: 2px;
    }

    .mission-list { 
        list-style: none; 
        overflow-y: auto; 
        flex: 1;
        padding-right: 5px;
    }
    
    .mission-list::-webkit-scrollbar { width: 4px; }
    .mission-list::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.2); border-radius: 10px; }

    .mission-item {
        margin-bottom: 12px;
        padding: 14px;
        border-radius: 10px;
        background: rgba(255,255,255,0.01);
        border: 1px solid rgba(255,255,255,0.05);
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .mission-item:hover {
        border-color: rgba(0, 255, 255, 0.4);
        background: rgba(0, 255, 255, 0.04);
    }

    .mission-item.active {
        border-color: var(--neon-blue);
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        background: rgba(0, 255, 255, 0.08);
    }

    .mission-id { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 13px; color: var(--neon-blue); }
    .mission-title { font-weight: 500; font-size: 14px; color: var(--text-main); margin: 2px 0; }
    .mission-desc { font-size: 11px; color: var(--text-muted); }

    /* พื้นที่เนื้อหาหลัก */
    .main-content {
        flex: 1;
        padding: 30px;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    .content-header {
        margin-bottom: 20px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
        flex-shrink: 0;
    }

    .content-header h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 26px;
        color: white;
        letter-spacing: 1px;
    }

    /* พื้นที่แสดงไฟล์ PDF ขยายใหญ่เต็มจอคอมพิวเตอร์ */
    .pdf-container {
        width: 100%;
        height: calc(100vh - 170px); /* ปรับความสูงอัตโนมัติให้ใหญ่เต็มที่สายตา */
        background: #1e293b;
        border: 1px solid rgba(0, 255, 255, 0.2);
        border-radius: 12px;
        box-shadow: 0 5px 25px rgba(0,0,0,0.4);
        overflow: hidden;
        position: relative;
        flex: 1;
    }
    
    .pdf-placeholder {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #64748b;
        text-align: center;
        z-index: 1;
    }

    .pdf-container iframe {
        width: 100%;
        height: 100%;
        border: none;
        position: relative;
        z-index: 2;
        background: transparent;
    }

    /* ปุ่ม AI */
    .ask-ai-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: linear-gradient(45deg, #00ffff, #8b5cf6);
        color: #020617;
        font-family: 'Prompt', sans-serif;
        font-weight: 600;
        padding: 14px 22px;
        border-radius: 30px;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
        transition: all 0.3s ease;
        z-index: 100;
    }

    .ask-ai-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 25px rgba(139, 92, 246, 0.5);
    }
</style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">PROJECT NEON</div>
        <ul class="mission-list" id="sidebarMenu"></ul>
    </aside>

    <main class="main-content">
        <div class="content-header">
            <h1 id="mainTitle">LOADING...</h1>
            <p id="mainSubtitle" style="color: var(--neon-blue); font-size: 14px; margin-top: 4px; font-weight: 500;"></p>
            <p id="mainDesc" style="color: var(--text-muted); margin-top: 8px; font-size: 13px;"></p>
        </div>

        <h3 style="color: var(--neon-blue); margin-bottom: 12px; font-size: 16px;">📄 Operation Manual (คู่มือปฏิบัติการ)</h3>
        <div class="pdf-container">
            <div class="pdf-placeholder" id="pdfPlaceholder">กำลังโหลดไฟล์ PDF คู่มือ...</div>
            <iframe id="pdfViewer" src=""></iframe>
        </div>
    </main>

    <button class="ask-ai-btn" onclick="openAITips()">
        ✨ Ask Gemini Tutor
    </button>

<script>
// ฐานข้อมูลบทเรียนและไฟล์ PDF (ตัดส่วนของ code snippet ทิ้งเพื่อความสะอาดของระบบ)
const database = [
    {
        id: "MISSION 0.1",
        title: "Introduction to IoT",
        desc: "ทำความเข้าใจแผนผังการไหลของข้อมูลจากปุ่มหน้าเว็บไปจนถึงบอร์ดรีเลย์",
        pdf: "mission0_1.pdf"
    },
    {
        id: "MISSION 0.2",
        title: "Tools Installation",
        desc: "ขั้นตอนการลงโปรแกรม Arduino IDE และ Driver พอร์ตอัปโหลด CH340",
        pdf: "mission0_2.pdf"
    },
    {
        id: "MISSION 0.3",
        title: "The Cloud Database",
        desc: "การสมัครบัญชี Google Cloud และเปิดใช้งาน Realtime Database บนระบบ Firebase",
        pdf: "22.pdf" /* เรียกใช้ไฟล์คู่มือสมัครตามฐานข้อมูลจริงของคุณครู */
    },
    {
        id: "MISSION 1.1",
        title: "Web UI Design",
        desc: "เริ่มต้นเขียนโค้ดภาษา HTML เพื่อสร้างกล่องคอนเทนเนอร์และปุ่มสำหรับกด",
        pdf: "mission1_1.pdf"
    },
    {
        id: "MISSION 2.2",
        title: "Cloud JavaScript Sync",
        desc: "การเขียนโค้ดสคริปต์สั่งให้หน้าปุ่มควบคุมส่งค่าสถานะขึ้นไปอัปเดตบนฐานข้อมูลคลาวด์",
        pdf: "mission2_2.pdf"
    },
    {
        id: "MISSION 3.3",
        title: "NodeMCU Wi-Fi & NTP",
        desc: "การเขียนโปรแกรมลงบอร์ดไมโครคอนโทรลเลอร์สั่งเชื่อมต่อ Wi-Fi และซิงค์เวลาโลก",
        pdf: "mission3_3.pdf"
    },
    {
        id: "MISSION 4.1",
        title: "Final Hardware Test",
        desc: "ประกอบร่างซอร์สโค้ดเพื่อรับข้อมูลการกดสวิตช์มาแปรเปลี่ยนเป็นแรงดันไฟควบคุมชุดรีเลย์",
        pdf: "mission4_1.pdf"
    }
];

// ฟังก์ชันสร้างรายการเมนูภารกิจ
function initSystem() {
    const menuContainer = document.getElementById("sidebarMenu");
    menuContainer.innerHTML = "";
    
    database.forEach((data, index) => {
        const li = document.createElement("li");
        li.className = "mission-item";
        if(index === 0) li.className += " active";
        li.setAttribute("onclick", `selectMission(${index})`);
        
        li.innerHTML = `
            <div class="mission-id">${data.id}</div>
            <div class="mission-title">${data.title}</div>
            <div class="mission-desc">${data.desc}</div>
        `;
        menuContainer.appendChild(li);
    });
    
    selectMission(0);
}

// ฟังก์ชันสลับเปลี่ยนไฟล์คู่มือ PDF เมื่อคลิกเมนู
function selectMission(index) {
    const items = document.querySelectorAll(".mission-item");
    items.forEach(item => item.classList.remove("active"));
    items[index].classList.add("active");
    
    const mission = database[index];
    document.getElementById("mainTitle").innerText = mission.id;
    document.getElementById("mainSubtitle").innerText = "📌 " + mission.title;
    document.getElementById("mainDesc").innerText = mission.desc;
    
    // โหลดไฟล์ PDF ของด่านนั้นๆ เข้ามาฉายในหน้าจอหลัก
    document.getElementById("pdfViewer").src = mission.pdf;
}

// หน้าต่างป๊อปอัปให้คำแนะนำการเขียน Prompt ของนักเรียน
function openAITips() {
    alert(
        "🤖 แนะนำวิธียื่นคำถามให้ที่ปรึกษาหลัก (Gemini Tutor):\n\n" +
        "1. เมื่อรันโค้ดแล้วระบบระเบิดเออร์เรอร์:\n" +
        "   ให้ก๊อปปี้แถบตัวอักษรสีส้มแจ้งเตือนด้านล่างจากโปรแกรมส่งให้ AI ตรวจสอบตรงๆ\n\n" +
        "2. เมื่อไม่เข้าใจบทบาทของชุดคำสั่งในคู่มือ:\n" +
        "   ให้เขียนคำสั่งถามว่า 'ช่วยอธิบายการทำงานของระบบนี้ให้เด็กนักเรียนเข้าใจง่ายๆ หน่อย'"
    );
}

window.onload = initSystem;
</script>
</body>
</html>
