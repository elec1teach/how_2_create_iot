<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJECT NEON - IoT Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #020617;
        --panel-bg: rgba(15, 23, 42, 0.7);
        --neon-blue: #00ffff;
        --neon-purple: #8b5cf6;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Prompt', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
        background-image: 
            radial-gradient(circle at 15% 50%, rgba(0, 255, 255, 0.05), transparent 25%),
            radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.05), transparent 25%);
    }

    /* แถบเมนูด้านซ้าย */
    .sidebar {
        width: 320px;
        background: var(--panel-bg);
        border-right: 1px solid rgba(0, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 20px;
        display: flex;
        flex-direction: column;
        z-index: 10;
    }

    .brand {
        font-family: 'Orbitron', sans-serif;
        font-size: 24px;
        color: var(--neon-blue);
        text-shadow: 0 0 10px var(--neon-blue);
        margin-bottom: 25px;
        text-align: center;
        letter-spacing: 2px;
    }

    .mission-list { 
        list-style: none; 
        overflow-y: auto; 
        flex: 1;
        padding-right: 5px;
    }
    
    /* ตกแต่งแถบเลื่อน Scrollbar ของเมนู */
    .mission-list::-webkit-scrollbar { width: 4px; }
    .mission-list::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.2); border-radius: 10px; }

    .mission-item {
        margin-bottom: 12px;
        padding: 14px;
        border-radius: 10px;
        background: rgba(255,255,255,0.01);
        border: 1px solid rgba(255,255,255,0.05);
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .mission-item:hover {
        border-color: rgba(0, 255, 255, 0.4);
        background: rgba(0, 255, 255, 0.04);
    }

    .mission-item.active {
        border-color: var(--neon-blue);
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        background: rgba(0, 255, 255, 0.08);
    }

    .mission-id { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 13px; color: var(--neon-blue); }
    .mission-title { font-weight: 500; font-size: 14px; color: var(--text-main); margin: 2px 0; }
    .mission-desc { font-size: 11px; color: var(--text-muted); }

    /* พื้นที่เนื้อหาหลัก */
    .main-content {
        flex: 1;
        padding: 30px;
        overflow-y: auto;
    }

    .content-header {
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 15px;
    }

    .content-header h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 26px;
        color: white;
        letter-spacing: 1px;
    }

    /* พื้นที่สำหรับดึงหน้า PDF มาแสดงผล */
    .pdf-container {
        width: 100%;
        height: 500px;
        background: #1e293b;
        border: 1px solid rgba(0, 255, 255, 0.2);
        border-radius: 12px;
        margin-bottom: 25px;
        box-shadow: 0 5px 25px rgba(0,0,0,0.4);
        overflow: hidden;
    }

    .pdf-container iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* กล่องแสดงโค้ดภาษาซี/HTML */
    .code-box {
        background: #090d16;
        padding: 20px;
        border-radius: 10px;
        border-left: 4px solid var(--neon-purple);
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        color: #cbd5e1;
        overflow-x: auto;
        white-space: pre;
        line-height: 1.5;
    }

    /* ปุ่มช่วยเหลือลอยตัว */
    .ask-ai-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: linear-gradient(45deg, #00ffff, #8b5cf6);
        color: #020617;
        font-family: 'Prompt', sans-serif;
        font-weight: 600;
        padding: 14px 22px;
        border-radius: 30px;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
        transition: all 0.3s ease;
        z-index: 100;
    }

    .ask-ai-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 25px rgba(139, 92, 246, 0.5);
    }
</style>
</head>
<body>

    <!-- แถบเมนูด้านซ้าย (เรนเดอร์ผ่าน JavaScript) -->
    <aside class="sidebar">
        <div class="brand">PROJECT NEON</div>
        <ul class="mission-list" id="sidebarMenu"></ul>
    </aside>

    <!-- พื้นที่เนื้อหาหลักแสดงแผนการสอนและไฟล์ปฏิบัติงาน -->
    <main class="main-content">
        <div class="content-header">
            <h1 id="mainTitle">LOADING...</h1>
            <p id="mainSubtitle" style="color: var(--neon-blue); font-size: 14px; margin-top: 4px; font-weight: 500;"></p>
            <p id="mainDesc" style="color: var(--text-muted); margin-top: 8px; font-size: 13px;"></p>
        </div>

        <h3 style="color: var(--neon-blue); margin-bottom: 12px; font-size: 16px;">📄 Operation Manual (คู่มือปฏิบัติการ)</h3>
        <div class="pdf-container">
            <iframe id="pdfViewer" src=""></iframe>
        </div>

        <h3 style="color: var(--neon-purple); margin-bottom: 12px; font-size: 16px;">💻 Code Snippet (ชิ้นส่วนโค้ดภารกิจ)</h3>
        <div class="code-box" id="codeViewer"></div>
    </main>

    <button class="ask-ai-btn" onclick="openAITips()">
        ✨ Ask Gemini Tutor
    </button>

<script>
// 1. คลังจัดเก็บข้อมูลบทเรียนทั้งหมด (คุณสามารถเปลี่ยนชื่อไฟล์ .pdf และโค้ดในนี้ได้เลยครับ)
const database = [
    {
        id: "MISSION 0.1",
        title: "Introduction to IoT",
        desc: "ทำความเข้าใจแผนผังการไหลของข้อมูลจากปุ่มหน้าเว็บเว็บแอปไปจนถึงบอร์ดรีเลย์ควบคุมไฟ",
        pdf: "mission0_1.pdf",
        code: "// ภารกิจทฤษฎีเบื้องต้น\n// โปรดเปิดอ่านคู่มือปฏิบัติการด้านบนเพื่อศึกษาแผนผังระบบ"
    },
    {
        id: "MISSION 0.2",
        title: "Tools Installation",
        desc: "ขั้นตอนการลงโปรแกรม Arduino IDE และ Driver พอร์ตอัปโหลด CH340 ลงคอมพิวเตอร์",
        pdf: "mission0_2.pdf",
        code: "// ขั้นตอนนี้ยังไม่มีชุดโค้ดคำสั่ง\n// ให้ทำการตั้งค่าโปรแกรมบนคอมพิวเตอร์ตามสไลด์คู่มือ"
    },
    {
        id: "MISSION 0.3",
        title: "The Cloud Database",
        desc: "การสมัครบัญชี Google Cloud และเปิดใช้งานคลังฐานข้อมูล Realtime Database บนระบบ Firebase",
        pdf: "mission0_3.pdf",
        code: "const firebaseConfig = {\n  apiKey: \"ใส่รหัส_API_KEY_ที่ได้จากก้อนเมฆคลาวด์ของคุณ\",\n  databaseURL: \"ใส่ที่อยู่_DATABASE_URL_ของคุณ\"\n};"
    },
    {
        id: "MISSION 1.1",
        title: "Web UI Design",
        desc: "เริ่มต้นเขียนโค้ดภาษา HTML เพื่อสร้างกล่องคอนเทนเนอร์และปุ่มสำหรับกดสลับสถานะควบคุมไฟ",
        pdf: "mission1_1.pdf",
        code: "<div class=\"device-row\">\n  <span class=\"device-name\">💡 ช่องที่ 1 (D1)</span>\n  <label class=\"switch\">\n     <input type=\"checkbox\" id=\"device1\" onchange=\"toggleDevice(1)\">\n     <span class=\"slider\"></span>\n  </label>\n</div>"
    },
    {
        id: "MISSION 2.2",
        title: "Cloud JavaScript Sync",
        desc: "การเขียนโค้ดสคริปต์สั่งให้หน้าปุ่มควบคุมส่งค่าสถานะ ON หรือ OFF ขึ้นไปอัปเดตบนฐานข้อมูลคลาวด์",
        pdf: "mission2_2.pdf",
        code: "function toggleDevice(channel) {\n  let isChecked = document.getElementById('device' + channel).checked;\n  let status = isChecked ? 'ON' : 'OFF';\n  \n  db.ref('SmartHome/relay_' + channel).set({\n     status: status\n  });\n}"
    },
    {
        id: "MISSION 3.3",
        title: "NodeMCU Wi-Fi & NTP",
        desc: "การเขียนโปรแกรมลงบอร์ดไมโครคอนโทรลเลอร์สั่งเชื่อมต่อเครือข่ายอินเทอร์เน็ตและซิงค์เวลาโลก",
        pdf: "mission3_3.pdf",
        code: "#include <ESP8266WiFi.h>\n\nvoid setup() {\n  WiFi.begin(\"ชื่อไวไฟของคุณ\", \"รหัสผ่านไวไฟของคุณ\");\n  configTime(7 * 3600, 0, \"pool.ntp.org\");\n}"
    },
    {
        id: "MISSION 4.1",
        title: "Final Hardware Test",
        desc: "ประกอบร่างซอร์สโค้ดฝั่งบอร์ดทั้งหมดเพื่อรับข้อมูลการกดสวิตช์มาแปรเปลี่ยนเป็นแรงดันไฟควบคุมชุดรีเลย์",
        pdf: "mission4_1.pdf",
        code: "if (status == \"ON\") {\n  digitalWrite(RELAY1, LOW);  // สั่งเปิดอุปกรณ์ไฟฟ้า\n} else if (status == \"OFF\") {\n  digitalWrite(RELAY1, HIGH); // สั่งปิดอุปกรณ์ไฟฟ้า\n}"
    }
];

// 2. ฟังก์ชันเริ่มสร้างเมนูที่แถบซ้ายเมื่อเปิดหน้าเว็บ
function initSystem() {
    const menuContainer = document.getElementById("sidebarMenu");
    menuContainer.innerHTML = "";
    
    database.forEach((data, index) => {
        const li = document.createElement("li");
        li.className = "mission-item";
        if(index === 0) li.className += " active";
        li.setAttribute("onclick", `selectMission(${index})`);
        
        li.innerHTML = `
            <div class="mission-id">${data.id}</div>
            <div class="mission-title">${data.title}</div>
            <div class="mission-desc">${data.desc}</div>
        `;
        menuContainer.appendChild(li);
    });
    
    // โหลดข้อมูลด่านแรกขึ้นมารอไว้บนหน้าจอ
    selectMission(0);
}

// 3. ฟังก์ชันสลับเปลี่ยนเนื้อหาบทเรียนเมื่อคลิกเลือกเมนู
function selectMission(index) {
    // สลับคลาสการไฮไลท์สีปุ่มเมนูที่แถบซ้าย
    const items = document.querySelectorAll(".mission-item");
    items.forEach(item => item.classList.remove("active"));
    items[index].classList.add("active");
    
    // ดึงชุดข้อมูลของด่านนั้นมาอัปเดตหน้าจอหลัก
    const mission = database[index];
    document.getElementById("mainTitle").innerText = mission.id;
    document.getElementById("mainSubtitle").innerText = "📌 " + mission.title;
    document.getElementById("mainDesc").innerText = mission.desc;
    
    // อัปเดตการแสดงผลไฟล์ PDF และซอร์สโค้ดตัวอย่าง
    document.getElementById("pdfViewer").src = mission.pdf;
    document.getElementById("codeViewer").innerText = mission.code;
}

// 4. หน้าต่างแนะนำเคล็ดลับแนวทางการคุยกับ AI ประจำเว็บแอป
function openAITips() {
    alert(
        "🤖 แนะนำวิธียื่นคำถามให้ที่ปรึกษาหลัก (Gemini Tutor):\n\n" +
        "1. เมื่อรันโค้ดแล้วระบบระเบิดเออร์เรอร์:\n" +
        "   ให้ก๊อปปี้แถบตัวอักษรสีส้มแจ้งเตือนด้านล่างจากโปรแกรมส่งให้ AI ตรวจสอบตรงๆ\n\n" +
        "2. เมื่อไม่เข้าใจบทบาทของชุดคำสั่งในกล่องโค้ด:\n" +
        "   ให้เขียนคำสั่งถามว่า 'ช่วยอธิบายการทำงานของฟังก์ชันนี้ให้เด็กนักเรียนเข้าใจง่ายๆ หน่อย'"
    );
}

// สั่งให้ระบบทำงานทันทีเมื่อหน้าเพจถูกโหลดสำเร็จ
window.onload = initSystem;
</script>
</body>
</html>
